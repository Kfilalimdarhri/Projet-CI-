services:
  jenkins:
    build: ./jenkins
    container_name: jenkins
    # root : nécessaire pour accéder au socket Docker monté ci-dessous (lab uniquement)
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ci

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    depends_on:
      - db
    ports:
      - "9000:9000"
    environment:
      # Base PostgreSQL dédiée (H2 embarqué n'est plus supporté)
      - SONAR_JDBC_URL=jdbc:postgresql://db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
      # Désactive le check Elasticsearch (utile sur Docker Desktop / petite config)
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    networks:
      - ci

  db:
    image: postgres:15
    container_name: sonar_db
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ci

volumes:
  jenkins_home:
  sonar_data:
  sonar_extensions:
  sonar_logs:
  postgres_data:

networks:
  ci:
